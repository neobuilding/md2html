name: Auto Release

# Allow manual trigger from the Actions tab.
# No automatic triggers (push/tag) to avoid loops.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.2.0). Leave empty to auto-detect from commits."
        required: false
        default: ""
      dry_run:
        description: "Dry run: calculate version and show commits, but do NOT create tag."
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  auto-tag:
    name: Calculate version and create tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag_created: ${{ steps.push.outputs.tag_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full history for git log

      - name: Calculate next version
        id: bump
        run: |
          set -e

          # If user provided a version, use it directly.
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            # Strip leading 'v' for processing, add back later
            VERSION="${VERSION#v}"
            # Validate format: x.y.z
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format: $VERSION. Use x.y.z (e.g. 0.2.0)"
              exit 1
            fi
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
            echo "::notice::Using manually specified version: v$VERSION"
            exit 0
          fi

          # Find the latest version tag
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST_TAG" ]; then
            echo "::notice::No existing version tag found, defaulting to v0.1.0"
            echo "version=v0.1.0" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "::notice::Latest tag: $LATEST_TAG"

          # Parse current version
          CURRENT="${LATEST_TAG#v}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          # Get commits since the latest tag
          COMMITS=$(git log ${LATEST_TAG}..HEAD --oneline --format="%s")

          if [ -z "$COMMITS" ]; then
            echo "::warning::No new commits since $LATEST_TAG. Nothing to release."
            echo "version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "::group::Commits since $LATEST_TAG"
          echo "$COMMITS"
          echo "::endgroup::"

          # Determine bump type from conventional commits
          BUMP="patch"  # default

          if echo "$COMMITS" | grep -qE '^BREAKING CHANGE|^[a-z]+!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\([a-z-]+\))?:'; then
            BUMP="minor"
          fi

          echo "::notice::Bump type: $BUMP (detected from commits)"

          # Apply bump
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "::notice::Calculated next version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Show version and exit if dry run
        if: ${{ inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "::warning::Dry run: no new commits, no version to release."
          else
            echo "::notice::Dry run: would create tag $VERSION"
          fi
          echo "Dry run complete. No tag was created."
          exit 0

      - name: Create and push tag
        id: push
        if: ${{ !inputs.dry_run && steps.bump.outputs.version != '' }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "tag_created=true" >> $GITHUB_OUTPUT
          echo "::notice::Tag $VERSION created and pushed."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No new commits to release
        if: ${{ !inputs.dry_run && steps.bump.outputs.version == '' }}
        run: |
          echo "::warning::No new commits since the latest tag. Nothing to release."
          echo "Push new commits to main, then run this workflow again."
